<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jim's Snake Adventure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a1a;
    --grid-line: #0d1f2d;
    --snake-head: #00ff88;
    --snake-body: #00cc66;
    --snake-outline: #00ff88;
    --food-jannat: #ff4dff;
    --food-shova: #ff9900;
    --food-hstu: #00cfff;
    --text-glow: #00ff88;
    --score-color: #fffbe6;
    --danger: #ff3c3c;
    --panel-bg: rgba(10, 20, 40, 0.92);
    --accent: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 8s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .game-wrapper {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 10px;
  }

  .title-bar {
    text-align: center;
    margin-bottom: 4px;
  }

  .title-bar h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2.5vw, 18px);
    color: var(--text-glow);
    text-shadow:
      0 0 10px #00ff88,
      0 0 30px #00ff88,
      0 0 60px #00cc44;
    letter-spacing: 3px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 10px #00ff88, 0 0 30px #00ff88, 0 0 60px #00cc44; }
    50% { text-shadow: 0 0 20px #00ff88, 0 0 50px #00ff88, 0 0 100px #00cc44; }
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 500px;
    padding: 8px 16px;
    background: var(--panel-bg);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 8px;
    backdrop-filter: blur(8px);
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 7px;
    color: rgba(0,255,136,0.5);
    letter-spacing: 2px;
  }

  .hud-value {
    font-size: clamp(12px, 2.5vw, 18px);
    color: var(--score-color);
    font-weight: 900;
    text-shadow: 0 0 10px rgba(255,255,200,0.5);
    transition: transform 0.15s;
  }

  .hud-value.pop {
    transform: scale(1.4);
    color: var(--accent);
  }

  .level-badge {
    font-size: 9px;
    background: linear-gradient(135deg, #00ff88, #00cc44);
    color: #000;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 900;
  }

  /* Canvas container */
  .canvas-container {
    position: relative;
    border: 2px solid rgba(0,255,136,0.3);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,255,136,0.1),
      0 0 40px rgba(0,255,136,0.15),
      inset 0 0 40px rgba(0,0,0,0.5);
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    touch-action: none;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 10, 20, 0.92);
    backdrop-filter: blur(4px);
    z-index: 20;
    gap: 20px;
    padding: 20px;
    transition: opacity 0.3s;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 24px);
    color: var(--text-glow);
    text-shadow: 0 0 20px #00ff88, 0 0 40px #00cc44;
    text-align: center;
    line-height: 1.6;
  }

  .overlay-title.danger {
    color: var(--danger);
    text-shadow: 0 0 20px var(--danger), 0 0 40px var(--danger);
    animation: dangerFlash 0.5s ease-in-out 3;
  }

  @keyframes dangerFlash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .overlay-sub {
    font-size: clamp(8px, 1.5vw, 11px);
    color: rgba(0,255,136,0.6);
    text-align: center;
    line-height: 2;
    letter-spacing: 1px;
  }

  .food-legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .food-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 8px;
    color: rgba(255,255,255,0.7);
  }

  .food-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    box-shadow: 0 0 8px currentColor;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1.5vw, 11px);
    padding: 14px 28px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    text-shadow: 0 0 10px var(--accent);
    box-shadow: 0 0 15px rgba(0,255,136,0.2), inset 0 0 15px rgba(0,255,136,0.05);
  }

  .btn:hover, .btn:active {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 30px rgba(0,255,136,0.6), inset 0 0 20px rgba(0,255,136,0.2);
    transform: scale(1.05);
  }

  .btn.danger-btn {
    border-color: var(--danger);
    color: var(--danger);
    text-shadow: 0 0 10px var(--danger);
    box-shadow: 0 0 15px rgba(255,60,60,0.2);
  }
  .btn.danger-btn:hover {
    background: var(--danger);
    color: #fff;
    box-shadow: 0 0 30px rgba(255,60,60,0.6);
  }

  .score-final {
    font-size: clamp(24px, 5vw, 40px);
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
  }

  .highscore-msg {
    font-size: 9px;
    color: #ffdd00;
    text-shadow: 0 0 10px #ffdd00;
    animation: titlePulse 1s infinite;
  }

  /* Controls hint */
  .controls-hint {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .ctrl-label {
    font-size: 7px;
    color: rgba(0,255,136,0.4);
    letter-spacing: 1px;
  }

  .ctrl-keys {
    display: flex;
    gap: 3px;
    flex-direction: column;
    align-items: center;
  }

  .ctrl-row { display: flex; gap: 3px; }

  .key {
    width: 24px;
    height: 24px;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: rgba(0,255,136,0.7);
  }

  /* Mobile swipe area */
  .swipe-hint {
    font-size: 8px;
    color: rgba(0,255,136,0.4);
    letter-spacing: 1px;
    text-align: center;
    margin-top: 4px;
  }

  /* Particles canvas overlay */
  #particleCanvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 15;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="title-bar">
    <h1>🐍 JIM'S SNAKE ADVENTURE</h1>
  </div>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="scoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="level-badge" id="levelDisplay">LVL 1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">BEST</span>
      <span class="hud-value" id="highscoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">EATEN</span>
      <span class="hud-value" id="eatenDisplay">0</span>
    </div>
  </div>

  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
      <div class="overlay-title">🐍 JIM THE<br>SNAKE</div>
      <div class="food-legend">
        <div class="food-item">
          <div class="food-dot" style="background:#ff4dff; color:#ff4dff;">●</div>
          <span>JANNAT <span style="color:#ff4dff">+10</span></span>
        </div>
        <div class="food-item">
          <div class="food-dot" style="background:#ff9900; color:#ff9900;">●</div>
          <span>SHOVA <span style="color:#ff9900">+15</span></span>
        </div>
        <div class="food-item">
          <div class="food-dot" style="background:#00cfff; color:#00cfff;">●</div>
          <span>HSTU <span style="color:#00cfff">+25</span></span>
        </div>
      </div>
      <div class="overlay-sub">
        SWIPE to move on mobile<br>
        Arrow Keys / WASD on desktop<br>
        P to Pause
      </div>
      <button class="btn" onclick="startGame()">▶ START GAME</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
      <div class="overlay-title danger" id="gameOverTitle">GAME OVER</div>
      <div class="score-final" id="finalScore">0</div>
      <div class="highscore-msg hidden" id="newHighMsg">🏆 NEW HIGH SCORE! 🏆</div>
      <div class="overlay-sub" id="gameOverSub">Jim crashed...</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <button class="btn" onclick="startGame()">▶ PLAY AGAIN</button>
        <button class="btn danger-btn" onclick="resetAll()">↺ RESET</button>
      </div>
    </div>

    <!-- Pause Screen -->
    <div class="overlay hidden" id="pauseScreen">
      <div class="overlay-title">⏸ PAUSED</div>
      <div class="overlay-sub">Press P or tap to resume</div>
      <button class="btn" onclick="togglePause()">▶ RESUME</button>
    </div>
  </div>

  <div class="swipe-hint">📱 SWIPE TO STEER JIM · ⌨ WASD / ARROW KEYS</div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CELL = 20;
const COLS = 25;
const ROWS = 25;
const W = COLS * CELL;
const H = ROWS * CELL;

const FOODS = [
  { name: 'JANNAT', color: '#ff4dff', glow: '#ff00ff', score: 10, rare: false },
  { name: 'SHOVA',  color: '#ff9900', glow: '#ffaa00', score: 15, rare: false },
  { name: 'HSTU',   color: '#00cfff', glow: '#00aaff', score: 25, rare: true  },
];

const SPEEDS = [180, 155, 130, 108, 90, 75, 62, 52]; // ms per tick per level
const LEVEL_THRESH = 5; // foods to level up

// ─── CANVAS SETUP ──────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');

canvas.width = pCanvas.width = W;
canvas.height = pCanvas.height = H;

const container = document.getElementById('canvasContainer');
container.style.width = W + 'px';
container.style.height = H + 'px';

// Responsive scale
function rescale() {
  const maxW = Math.min(window.innerWidth - 20, 520);
  const scale = Math.min(maxW / W, (window.innerHeight - 220) / H, 1);
  const s = Math.max(0.4, scale);
  container.style.transform = `scale(${s})`;
  container.style.transformOrigin = 'top center';
  document.querySelector('.game-wrapper').style.marginTop =
    (H * s - H + 10) / 2 + 'px';
}
rescale();
window.addEventListener('resize', rescale);

// ─── STATE ─────────────────────────────────────────────────────────────────
let snake, dir, nextDir, food, score, highscore, eaten, level;
let gameState = 'start'; // start | playing | paused | over
let gameLoop = null;
let particles = [];
let flashTimer = 0;
let foodAnim = 0;
let scorePopQueue = [];

highscore = parseInt(localStorage.getItem('jimSnakeHS') || '0');
document.getElementById('highscoreDisplay').textContent = highscore;

// ─── INIT ───────────────────────────────────────────────────────────────────
function initGame() {
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake = [
    {x: cx, y: cy},
    {x: cx-1, y: cy},
    {x: cx-2, y: cy},
    {x: cx-3, y: cy},
    {x: cx-4, y: cy},
  ];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0; eaten = 0; level = 1;
  particles = [];
  spawnFood();
  updateHUD();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));

  // HSTU is rarer
  let type;
  const r = Math.random();
  if (r < 0.45) type = FOODS[0];
  else if (r < 0.8) type = FOODS[1];
  else type = FOODS[2];

  food = { ...pos, ...type };
}

// ─── GAME LOOP ──────────────────────────────────────────────────────────────
function startGame() {
  hide('startScreen'); hide('gameOverScreen'); hide('pauseScreen');
  initGame();
  gameState = 'playing';
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, SPEEDS[Math.min(level-1, SPEEDS.length-1)]);
}

function resetAll() {
  localStorage.removeItem('jimSnakeHS');
  highscore = 0;
  document.getElementById('highscoreDisplay').textContent = 0;
  hide('gameOverScreen');
  show('startScreen');
  gameState = 'start';
}

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    show('pauseScreen');
    clearInterval(gameLoop);
  } else if (gameState === 'paused') {
    gameState = 'playing';
    hide('pauseScreen');
    gameLoop = setInterval(tick, SPEEDS[Math.min(level-1, SPEEDS.length-1)]);
  }
}

function tick() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall wrap
  head.x = (head.x + COLS) % COLS;
  head.y = (head.y + ROWS) % ROWS;

  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    // Eat food
    eatFood();
  } else {
    snake.pop();
  }

  draw();
}

function eatFood() {
  const pts = food.score * level;
  score += pts;
  eaten++;
  scorePopQueue.push({ val: `+${pts}`, x: food.x * CELL, y: food.y * CELL, color: food.color });
  spawnParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2, food.color, 20);
  flashTimer = 8;

  // Level up
  if (eaten % LEVEL_THRESH === 0 && level < 8) {
    level++;
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, SPEEDS[Math.min(level-1, SPEEDS.length-1)]);
    spawnParticles(W/2, H/2, '#00ff88', 40);
  }

  spawnFood();
  updateHUD();
  animateHUDPop('scoreDisplay');
}

function gameOver() {
  clearInterval(gameLoop);
  gameState = 'over';

  const isNew = score > highscore;
  if (isNew) {
    highscore = score;
    localStorage.setItem('jimSnakeHS', highscore);
    document.getElementById('highscoreDisplay').textContent = highscore;
  }

  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOverSub').textContent =
    `Jim ate ${eaten} foods and reached Level ${level}`;
  document.getElementById('newHighMsg').classList.toggle('hidden', !isNew);
  show('gameOverScreen');
  draw();
}

// ─── DRAWING ────────────────────────────────────────────────────────────────
function draw() {
  foodAnim += 0.07;
  ctx.clearRect(0, 0, W, H);

  drawGrid();
  drawFood();
  drawSnake();
  drawParticles();
  drawScorePops();

  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(0,255,136,${flashTimer * 0.015})`;
    ctx.fillRect(0, 0, W, H);
    flashTimer--;
  }
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, H);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(W, y * CELL);
    ctx.stroke();
  }
}

function drawFood() {
  const f = food;
  const cx = f.x * CELL + CELL/2;
  const cy = f.y * CELL + CELL/2;
  const pulse = Math.sin(foodAnim * 2) * 0.15 + 0.85;
  const r = (CELL * 0.42) * pulse;

  // Outer glow
  const grad = ctx.createRadialGradient(cx, cy, r*0.2, cx, cy, r*2.5);
  grad.addColorStop(0, f.glow + '88');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(f.x*CELL - CELL, f.y*CELL - CELL, CELL*3, CELL*3);

  // Food body - rounded rect
  ctx.save();
  ctx.shadowColor = f.glow;
  ctx.shadowBlur = 15;
  roundRect(ctx, f.x*CELL + 2, f.y*CELL + 2, CELL-4, CELL-4, 5);
  ctx.fillStyle = f.color;
  ctx.fill();
  ctx.restore();

  // Food name text
  ctx.save();
  ctx.font = `bold ${CELL > 20 ? 7 : 6}px 'Orbitron', monospace`;
  ctx.fillStyle = '#000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(f.name.length > 5 ? f.name.slice(0,4) : f.name, cx, cy);
  ctx.restore();

  // Orbit ring
  ctx.save();
  ctx.strokeStyle = f.color + '66';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.arc(cx, cy, r + 4, foodAnim, foodAnim + Math.PI * 1.5);
  ctx.stroke();
  ctx.restore();
}

function drawSnake() {
  const len = snake.length;

  for (let i = len - 1; i >= 0; i--) {
    const seg = snake[i];
    const x = seg.x * CELL;
    const y = seg.y * CELL;
    const t = i / len; // 0=head, 1=tail
    const isHead = i === 0;

    // Color gradient from head to tail
    const r = Math.round(0 + t * 0);
    const g = Math.round(255 - t * 100);
    const b = Math.round(136 - t * 80);
    const alpha = 1 - t * 0.3;
    const segColor = `rgba(${r},${g},${b},${alpha})`;
    const glowColor = `rgba(0,${Math.round(255 - t*120)},${Math.round(136 - t*80)},0.6)`;

    ctx.save();
    if (!isHead) {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 8;
    } else {
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 20;
    }

    // Segment background
    roundRect(ctx, x+1, y+1, CELL-2, CELL-2, isHead ? 7 : 4);
    ctx.fillStyle = segColor;
    ctx.fill();

    // Outline
    ctx.strokeStyle = isHead ? '#00ff88' : `rgba(0,200,100,${0.6 - t*0.3})`;
    ctx.lineWidth = isHead ? 1.5 : 0.8;
    ctx.stroke();
    ctx.restore();

    // "JIM" text on body segments
    if (!isHead) {
      const label = 'JIM';
      const ch = label[(i - 1) % label.length];
      ctx.save();
      ctx.font = `bold ${CELL > 20 ? 8 : 7}px 'Orbitron', monospace`;
      ctx.fillStyle = `rgba(0,0,0,${0.7 - t * 0.3})`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ch, x + CELL/2, y + CELL/2);
      ctx.restore();
    }

    // Head details: eyes
    if (isHead) {
      drawEyes(x, y);
    }
  }
}

function drawEyes(x, y) {
  const d = dir;
  let eye1, eye2;

  if (d.x === 1) { // moving right
    eye1 = {ex: x + CELL*0.7, ey: y + CELL*0.25};
    eye2 = {ex: x + CELL*0.7, ey: y + CELL*0.75};
  } else if (d.x === -1) { // moving left
    eye1 = {ex: x + CELL*0.3, ey: y + CELL*0.25};
    eye2 = {ex: x + CELL*0.3, ey: y + CELL*0.75};
  } else if (d.y === -1) { // moving up
    eye1 = {ex: x + CELL*0.25, ey: y + CELL*0.3};
    eye2 = {ex: x + CELL*0.75, ey: y + CELL*0.3};
  } else { // moving down
    eye1 = {ex: x + CELL*0.25, ey: y + CELL*0.7};
    eye2 = {ex: x + CELL*0.75, ey: y + CELL*0.7};
  }

  [eye1, eye2].forEach(e => {
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.arc(e.ex, e.ey, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e.ex + d.x*0.8, e.ey + d.y*0.8, 1.2, 0, Math.PI*2);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.restore();
  });
}

// ─── PARTICLES ──────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      size: 2 + Math.random() * 4,
      color
    });
  }
}

function drawParticles() {
  pCtx.clearRect(0, 0, W, H);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.vx *= 0.97;
    p.life -= p.decay;

    pCtx.save();
    pCtx.globalAlpha = p.life;
    pCtx.shadowColor = p.color;
    pCtx.shadowBlur = 8;
    pCtx.fillStyle = p.color;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    pCtx.fill();
    pCtx.restore();
  });
}

// ─── SCORE POPS ─────────────────────────────────────────────────────────────
function drawScorePops() {
  scorePopQueue = scorePopQueue.filter(p => p.life > 0);
  scorePopQueue.forEach(p => {
    if (!p.life) p.life = 1;
    p.y -= 1.5;
    p.life -= 0.03;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.font = `bold 11px 'Orbitron', monospace`;
    ctx.fillStyle = p.color;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.textAlign = 'center';
    ctx.strokeText(p.val, p.x + CELL/2, p.y);
    ctx.fillText(p.val, p.x + CELL/2, p.y);
    ctx.restore();
  });
}

// ─── HUD ────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('highscoreDisplay').textContent = highscore;
  document.getElementById('eatenDisplay').textContent = eaten;
  document.getElementById('levelDisplay').textContent = `LVL ${level}`;
}

function animateHUDPop(id) {
  const el = document.getElementById(id);
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 200);
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── INPUT: KEYBOARD ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key)) {
    e.preventDefault();
  }
  if (gameState !== 'playing' && gameState !== 'paused') return;
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
  if (gameState !== 'playing') return;

  const map = {
    'ArrowUp':    {x:0, y:-1}, 'w': {x:0, y:-1},
    'ArrowDown':  {x:0, y:1},  's': {x:0, y:1},
    'ArrowLeft':  {x:-1, y:0}, 'a': {x:-1, y:0},
    'ArrowRight': {x:1, y:0},  'd': {x:1, y:0},
  };
  const nd = map[e.key];
  if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
});

// ─── INPUT: SWIPE / TOUCH ────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 20) {
    // Tap = pause toggle
    if (gameState === 'playing' || gameState === 'paused') togglePause();
    return;
  }
  if (gameState !== 'playing') return;
  let nd;
  if (absDx > absDy) {
    nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  } else {
    nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  }
  if (!(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
}, {passive: true});

// ─── INPUT: GYROSCOPE (device tilt) ──────────────────────────────────────────
let gyroEnabled = false;
let lastGyroDir = null;

function enableGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => {
      if (r === 'granted') attachGyro();
    });
  } else {
    attachGyro();
  }
}

function attachGyro() {
  gyroEnabled = true;
  window.addEventListener('deviceorientation', e => {
    if (gameState !== 'playing') return;
    const gamma = e.gamma || 0; // left-right tilt
    const beta  = e.beta  || 0; // forward-back tilt
    const TILT = 18;
    let nd = null;
    if (Math.abs(gamma) > Math.abs(beta)) {
      nd = gamma > TILT ? {x:1,y:0} : gamma < -TILT ? {x:-1,y:0} : null;
    } else {
      nd = beta > TILT ? {x:0,y:1} : beta < -TILT ? {x:0,y:-1} : null;
    }
    if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) {
      const key = `${nd.x},${nd.y}`;
      if (key !== lastGyroDir) { nextDir = nd; lastGyroDir = key; }
    }
  });
}

// Try enabling gyro automatically
setTimeout(enableGyro, 500);

// ─── RENDER IDLE ANIMATION (start screen) ────────────────────────────────────
function idleRender() {
  if (gameState !== 'start' && gameState !== 'over') return;
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  // Animated demo snake silhouette
  const t = Date.now() / 1000;
  for (let i = 0; i < 8; i++) {
    const x = (Math.sin(t + i * 0.5) * 5 + COLS/2 - 4 + i) * CELL;
    const y = (Math.cos(t * 0.7 + i * 0.3) * 3 + ROWS/2) * CELL;
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(x, y, CELL-2, CELL-2);
    ctx.restore();
  }
  requestAnimationFrame(idleRender);
}
idleRender();
</script>
